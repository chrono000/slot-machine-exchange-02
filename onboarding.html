<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Get Started — HX</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #121218; }
  </style>
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <!-- React/ReactDOM vendored locally (loads offline). Babel still lazy-loads from CDN
       via shared.js (hxEnsureBabel) only on a compile-cache miss. -->
</head>
<body>
  <div id="root"></div>
  <script src="shared.js"></script>
  <script>
    const preamble = `
      const { useCallback, useEffect, useLayoutEffect, useMemo, useRef, useState } = React;
    `;
    fetch('OnboardingPage.jsx')
      .then(r => r.text())
      .then(src => {
        const code = src
          .replace(/^import\s+.*?from\s+["']react["'];?\s*/m, '')
          .replace(/export\s+default\s+function\s+OnboardingPage/, 'function OnboardingPage');

        const full = preamble + code + `
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(OnboardingPage));
        `;
        return hxCompile('OnboardingPage.jsx', full);
      })
      .then(compiled => { new Function(compiled)(); })
      .catch(err => {
        document.getElementById('root').innerText = 'Error loading component: ' + err.message;
        console.error(err);
      });
  </script>
</body>
</html>
